name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run verify:method-guide
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  portable-smoke:
    needs: [backend, frontend]
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Prepare portable build environment
        shell: pwsh
        run: |
          python -m venv backend/.venv
          & .\backend\.venv\Scripts\python.exe -m pip install --upgrade pip
          & .\backend\.venv\Scripts\python.exe -m pip install -r backend\requirements.txt
          npm ci --prefix frontend
      - name: Build portable release
        shell: pwsh
        run: |
          & .\scripts\build_portable.ps1
      - name: Extract and smoke-test portable release
        shell: pwsh
        run: |
          $zipPath = Join-Path $PWD 'workspace\release\AsteriaAnalyst-portable.zip'
          if (-not (Test-Path -LiteralPath $zipPath)) {
            throw "Portable ZIP was not created: $zipPath"
          }

          $extractRoot = Join-Path $env:RUNNER_TEMP 'Asteria Analyst portable smoke'
          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractRoot -Force
          $portableRoot = $extractRoot
          foreach ($relativePath in @(
            'start-asteria.ps1',
            'start-asteria.bat',
            'USER-GUIDE.txt',
            'USER-GUIDE.zh-CN.md',
            'backend\run_desktop.py',
            'runtime\python\python.exe'
          )) {
            if (-not (Test-Path -LiteralPath (Join-Path $portableRoot $relativePath))) {
              throw "Portable package is missing $relativePath"
            }
          }
          $port = 18787
          if (Get-NetTCPConnection -LocalPort $port -State Listen -ErrorAction SilentlyContinue) {
            throw "Portable smoke-test port is already in use: $port"
          }

          try {
            & (Join-Path $portableRoot 'start-asteria.ps1') -NoBrowser -PreferredPort $port
            $health = Invoke-RestMethod -Uri "http://127.0.0.1:$port/health" -TimeoutSec 10
            if ($health.status -ne 'ok') {
              throw "Unexpected portable health response: $($health | ConvertTo-Json -Compress)"
            }
            foreach ($path in @('/analysis', '/lab', '/lab/method-guide', '/revision', '/revision/workspace')) {
              $page = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:$port$path" -TimeoutSec 20
              if ($page.StatusCode -ne 200) {
                throw "Portable route failed: $path returned $($page.StatusCode)"
              }
            }
          } finally {
            $listener = Get-NetTCPConnection -LocalPort $port -State Listen -ErrorAction SilentlyContinue |
              Select-Object -First 1
            if ($listener) {
              Stop-Process -Id $listener.OwningProcess -Force
            }
          }
      - name: Upload verified portable package
        uses: actions/upload-artifact@v4
        with:
          name: AsteriaAnalyst-portable-${{ github.sha }}
          path: workspace/release/AsteriaAnalyst-portable.zip
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: portable-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified portable package
        uses: actions/download-artifact@v4
        with:
          name: AsteriaAnalyst-portable-${{ github.sha }}
          path: release-assets
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release-assets/AsteriaAnalyst-portable.zip \
            --title "Asteria Analyst ${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --generate-notes
